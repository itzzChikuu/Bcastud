<!DOCTYPE html>
<html>
<head>
<title>My Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Arial,sans-serif;
background:#f1f5f9;
margin:0;
}

/* Top Header */

.topbar{
background:linear-gradient(135deg,#1d4ed8,#7c3aed);
color:white;
font-size:28px;
font-weight:600;
padding:18px;
text-align:center;
letter-spacing:1px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* Container */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:25px;
max-width:1200px;
margin:auto;
}

/* Product Card */

.product{
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:0.3s;
text-align:center;
}

.product:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

/* Image */

.product img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* Title */

.product h3{
margin:8px 0;
font-size:18px;
}

/* Description */

.product p{
font-size:14px;
color:#555;
}

/* Price */

.price{
color:#16a34a;
font-size:22px;
font-weight:bold;
margin-top:6px;
}

/* Buttons */

button{
background:#2563eb;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
}

.deleteBtn{
background:#ef4444;
}

.deleteBtn:hover{
background:#dc2626;
}

/* Owner button */

body > button{
margin-top:15px;
}

/* Admin Panel */

#adminPanel{
display:none;
background:white;
margin:30px auto;
padding:20px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
width:90%;
max-width:380px;
}

#adminPanel h2{
margin-top:0;
}

/* Inputs */

input,textarea{
width:100%;
padding:10px;
border-radius:7px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
height:70px;
}

/* Mobile */

@media(max-width:600px){

.topbar{
font-size:22px;
}

.container{
padding:15px;
}

}

</style>
</head>

<body>

<header class="topbar">
My Store
</header>

<button onclick="ownerLogin()">Owner Login</button>

<div class="container" id="productList"></div>

<div id="adminPanel">

<h2>Add Product</h2>

<input type="text" id="pname" placeholder="Product Name"><br><br>

<input type="number" id="pprice" placeholder="Price"><br><br>

<textarea id="pdesc" placeholder="Product Details"></textarea><br><br>

<input type="file" id="pimage"><br><br>

<button onclick="addProduct()">Upload Product</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
addDoc,
collection,
getDocs,
deleteDoc,
doc
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBkyMRqVdT8os6CABAycIlWxOUxNnUmXhk",
authDomain: "mystor-9e60e.firebaseapp.com",
projectId: "mystor-9e60e",
storageBucket: "mystor-9e60e.firebasestorage.app",
messagingSenderId: "878871303738",
appId: "1:878871303738:web:c7ee144a573e0689a6c703"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let isOwner=false;

window.ownerLogin=function(){

let pass=prompt("Enter Owner Password");

if(pass==="1234"){

isOwner=true;

document.getElementById("adminPanel").style.display="block";

loadProducts();

}else{

alert("Wrong Password");

}

}

window.addProduct=async function(){

let name=document.getElementById("pname").value;

let price=document.getElementById("pprice").value;

let desc=document.getElementById("pdesc").value;

let file=document.getElementById("pimage").files[0];

let reader=new FileReader();

reader.onload=async function(e){

await addDoc(collection(db,"products"),{

name:name,

price:price,

desc:desc,

img:e.target.result

});

alert("Product Added");

loadProducts();

};

reader.readAsDataURL(file);

}

async function loadProducts(){

let html="";

const querySnapshot=await getDocs(collection(db,"products"));

querySnapshot.forEach((d)=>{

let p=d.data();

let id=d.id;

html+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>${p.desc}</p>

<p class="price">₹${p.price}</p>

${isOwner ? `<button class="deleteBtn" onclick="deleteProduct('${id}')">Delete</button>` : ""}

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}

window.deleteProduct=async function(id){

await deleteDoc(doc(db,"products",id));

loadProducts();

}

loadProducts();

</script>

</body>
</html>
