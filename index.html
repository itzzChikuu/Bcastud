<!DOCTYPE html>
<html>
<head>
<title>My Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
margin:0;
text-align:center;
}

/* Header */

header{
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

/* Container */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

/* Product Card */

.product{
background:white;
width:90%;
max-width:250px;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.product:hover{
transform:translateY(-6px);
box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* Image */

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* Price */

.price{
color:#16a34a;
font-size:22px;
font-weight:bold;
}

/* Buttons */

button{
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:white;
border:none;
padding:10px 16px;
cursor:pointer;
border-radius:8px;
margin:5px;
font-weight:bold;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

.deleteBtn{
background:linear-gradient(135deg,#ef4444,#dc2626);
}

/* Admin Panel */

#adminPanel{
display:none;
margin-top:30px;
background:white;
padding:20px;
width:90%;
max-width:350px;
margin-left:auto;
margin-right:auto;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* Inputs */

input,textarea{
width:90%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* Mobile */

@media (max-width:600px){

header{
font-size:22px;
padding:15px;
}

.product{
width:90%;
}

button{
width:90%;
}

}

</style>
</head>

<body>

<header>My Store Products</header>

<button onclick="ownerLogin()">Owner Login</button>

<div class="container" id="productList"></div>

<div id="adminPanel">

<h2>Add Product</h2>

<input type="text" id="pname" placeholder="Product Name"><br><br>

<input type="number" id="pprice" placeholder="Price"><br><br>

<textarea id="pdesc" placeholder="Product Details"></textarea><br><br>

<input type="file" id="pimage"><br><br>

<button onclick="addProduct()">Upload Product</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
addDoc,
collection,
getDocs,
deleteDoc,
doc
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBkyMRqVdT8os6CABAycIlWxOUxNnUmXhk",
authDomain: "mystor-9e60e.firebaseapp.com",
projectId: "mystor-9e60e",
storageBucket: "mystor-9e60e.firebasestorage.app",
messagingSenderId: "878871303738",
appId: "1:878871303738:web:c7ee144a573e0689a6c703"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let isOwner=false;

window.ownerLogin=function(){

let pass=prompt("Enter Owner Password");

if(pass==="1234"){

isOwner=true;

document.getElementById("adminPanel").style.display="block";

loadProducts();

}else{

alert("Wrong Password");

}

}

window.addProduct=async function(){

let name=document.getElementById("pname").value;

let price=document.getElementById("pprice").value;

let desc=document.getElementById("pdesc").value;

let file=document.getElementById("pimage").files[0];

let reader=new FileReader();

reader.onload=async function(e){

await addDoc(collection(db,"products"),{

name:name,

price:price,

desc:desc,

img:e.target.result

});

alert("Product Added");

loadProducts();

};

reader.readAsDataURL(file);

}

async function loadProducts(){

let html="";

const querySnapshot=await getDocs(collection(db,"products"));

querySnapshot.forEach((d)=>{

let p=d.data();

let id=d.id;

html+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>${p.desc}</p>

<p class="price">₹${p.price}</p>

${isOwner ? `<button class="deleteBtn" onclick="deleteProduct('${id}')">Delete</button>` : ""}

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}

window.deleteProduct=async function(id){

await deleteDoc(doc(db,"products",id));

loadProducts();

}

loadProducts();

</script>

</body>
</html>
