<!DOCTYPE html>
<html>
<head>
<title>My Store</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#333;
color:white;
padding:15px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.product{
background:white;
width:250px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.price{
color:green;
font-size:20px;
font-weight:bold;
}

button{
background:blue;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
margin:5px;
}

.deleteBtn{
background:red;
}

#adminPanel{
display:none;
margin-top:30px;
background:white;
padding:20px;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<h1>My Store Products</h1>

<button onclick="ownerLogin()">Owner Login</button>

<div class="container" id="productList"></div>

<div id="adminPanel">

<h2>Add Product</h2>

<input type="text" id="pname" placeholder="Product Name"><br><br>

<input type="number" id="pprice" placeholder="Price"><br><br>

<textarea id="pdesc" placeholder="Product Details"></textarea><br><br>

<input type="file" id="pimage"><br><br>

<button onclick="addProduct()">Upload Product</button>

</div>

<script>

let isOwner=false;

function ownerLogin(){
let pass = prompt("Enter Owner Password");

if(pass==="1234"){
isOwner=true;
document.getElementById("adminPanel").style.display="block";
renderProducts();
}else{
alert("Wrong Password");
}
}

let products = JSON.parse(localStorage.getItem("products")) || [];

function saveProducts(){
localStorage.setItem("products",JSON.stringify(products));
}

function renderProducts(){

let html="";

products.forEach((p,index)=>{

html+=`
<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<p class="price">₹${p.price}</p>

${isOwner ? `<button class="deleteBtn" onclick="deleteProduct(${index})">Delete</button>` : ""}

</div>
`;

});

document.getElementById("productList").innerHTML=html;

}

function addProduct(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let desc=document.getElementById("pdesc").value;

let file=document.getElementById("pimage").files[0];

let reader=new FileReader();

reader.onload=function(e){

products.push({
name:name,
price:price,
desc:desc,
img:e.target.result
});

saveProducts();
renderProducts();

}

reader.readAsDataURL(file);

}

function deleteProduct(index){

products.splice(index,1);

saveProducts();
renderProducts();

}

renderProducts();

</script>

</body>
</html>
